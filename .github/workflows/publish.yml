name: Publish

on:
  push:
    tags:
      - "v*"

# Default to no permissions; only grant what each job needs.
permissions: {}

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      - name: Sanity-check wheel contents
        # Fail the build if tests/examples/scripts/binary assets leak into the
        # wheel. These should never ship — only src/dash_relay/*.py + the JS.
        run: |
          if python -m zipfile -l dist/*.whl | grep -iE 'test|example|script|\.gif|\.png'; then
            echo "::error::wheel contains files that should not ship"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dash-relay/
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dash-relay/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        run: pip install -e .[dev]

      # Playwright integration tests auto-skip when playwright isn't installed
      # (tests/test_event_types.py uses pytest.importorskip). Running the full
      # tests/ directory therefore covers the 35 unit tests; the 15 browser
      # tests run on demand with a separate `.[integration]` install.
      - name: Run unit tests
        run: pytest -v

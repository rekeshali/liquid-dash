version: 2

updates:
  # Bump pinned pip deps (dash>=2.16 and the dev/integration extras)
  # once a month. Monthly > weekly because this library's dep surface
  # is tiny — weekly would be mostly noise.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python-deps:
        patterns:
          - "*"

  # Keep the GitHub Actions versions in .github/workflows/*.yml current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
